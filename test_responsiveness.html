<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsiveness Test</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: system-ui, -apple-system, sans-serif;
        }
        .container {
            padding: 20px;
            background-color: #fff9f2;
        }
        .header {
            background-color: #c0c9ee;
            padding: 10px 0;
            text-align: center;
            font-family: 'Courier New', Courier, monospace;
            font-weight: 500;
        }
        .main-content {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            padding: 20px;
            background-color: #FFF2E0;
        }
        .card {
            background-color: #C0C9EE;
            border-radius: 8px;
            padding: 15px;
            text-align: center;
        }
        .product-image {
            width: 100%;
            height: auto;
            border-radius: 4px;
            margin-bottom: 10px;
        }
        .message {
            text-align: center;
            padding: 20px;
            background-color: #FFF2E0;
        }
        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }
            .container {
                padding: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="marquee-wrapper">
                <div class="marquee-content">
                    <span>FREE SHIPPING ON ORDERS ABOVE ₹499</span>
                    <span>GET 10% OFF ON YOUR FIRST ORDER</span>
                    <span>NEW: SUMMER SKIN COLLECTION</span>
                    <span>CHECK OUR BODY & HAIR RANGE COLLECTION</span>
                </div>
            </div>
        </div>

        <div class="main-content">
            <div class="card">
                <img src="https://via.placeholder.com/200x200" alt="Product" class="product-image">
                <h3>Product Name</h3>
                <p>$19.99</p>
            </div>
            <div class="card">
                <img src="https://via.placeholder.com/200x200" alt="Product" class="product-image">
                <h3>Product Name</h3>
                <p>$19.99</p>
            </div>
            <div class="card">
                <img src="https://via.placeholder.com/200x200" alt="Product" class="product-image">
                <h3>Product Name</h3>
                <p>$19.99</p>
            </div>
        </div>

        <div class="message">
            <h2>Welcome to Our Store</h2>
            <p>Resize your browser to see responsive design in action!</p>
        </div>
    </div>
</body>
</html>
